{% extends "base.html" %}
{% block content %}
<div class="page-head"><h1>Supervisores</h1></div>
<form method="post" class="form-inline">
    <input name="nome" placeholder="Nome" required>
    <input type="email" name="email" placeholder="E-mail" required>
    <input type="password" name="senha" placeholder="Senha" required>
    <button type="submit">Cadastrar</button>
</form>

<div class="table-wrap">
    <table>
        <thead>
            <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Status</th>
                <th>Nova senha</th>
                <th>Salvar</th>
                <th>Excluir</th>
            </tr>
        </thead>
        <tbody>
            {% for supervisor in supervisores %}
            <tr>
                <form method="post" action="{{ url_for('admin.editar_supervisor', supervisor_id=supervisor.id) }}">
                    <td><input name="nome" value="{{ supervisor.nome }}" required></td>
                    <td><input type="email" name="email" value="{{ supervisor.email }}" required></td>
                    <td>
                        <label class="check">
                            <input type="checkbox" name="ativo" {% if supervisor.ativo %}checked{% endif %}>
                            {% if supervisor.ativo %}Ativo{% else %}Inativo{% endif %}
                        </label>
                    </td>
                    <td><input type="password" name="senha" placeholder="Manter senha"></td>
                    <td><button type="submit">Salvar</button></td>
                </form>
                <td>
                    <form method="post" action="{{ url_for('admin.excluir_supervisor', supervisor_id=supervisor.id) }}" onsubmit="return confirm('Excluir este supervisor? Só será permitido se ele não tiver visitas no histórico.');">
                        <button type="submit" class="danger-button">Excluir</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
